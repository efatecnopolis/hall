<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Informativo — EFA Campomar</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-display: 'Montserrat', sans-serif;
      --font-body:    'Nunito Sans', sans-serif;
      --header-h:     110px;
      --footer-h:     80px;
      --radius:       16px;
    }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #0a0c0a;
      font-family: var(--font-body);
      color: #e2e2e2;
    }

    /* ── SCALER ── */
    #scaler {
      width: 1920px; height: 1080px;
      transform-origin: top left;
      position: absolute; top: 0; left: 0;
    }

    /* ══════════════════════════════════════════
       BACKGROUNDS
    ══════════════════════════════════════════ */
    .bg-layer {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 1.6s ease;
      pointer-events: none; overflow: hidden;
    }
    .bg-layer.active { opacity: 1; }

    /* JORNADA — navy + animated grid */
    #bg-jornada {
      background: linear-gradient(135deg, #03060f 0%, #071530 45%, #0b1e4a 75%, #040c20 100%);
    }
    #bg-jornada .bg-grid {
      position: absolute; inset: -60px;
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 79px, rgba(74,158,222,.06) 80px),
        repeating-linear-gradient(90deg,  transparent, transparent 79px, rgba(74,158,222,.06) 80px),
        repeating-linear-gradient(-45deg, transparent, transparent 119px, rgba(74,158,222,.035) 120px);
      animation: grid-drift 90s linear infinite;
    }
    @keyframes grid-drift {
      0%   { transform: translate(0,0); }
      100% { transform: translate(80px, 80px); }
    }
    #bg-jornada .bg-glow {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 82% 115%, rgba(74,158,222,.14) 0%, transparent 60%),
        radial-gradient(ellipse 600px 400px at 8% -8%,  rgba(231,197,29,.06)  0%, transparent 50%);
    }

    /* VISITA — forest + rain dots */
    #bg-visita {
      background: linear-gradient(135deg, #020d04 0%, #062910 45%, #083d16 75%, #031507 100%);
    }
    #bg-visita .bg-dots {
      position: absolute; inset: -120px;
      background-image:
        radial-gradient(circle 1px at 20px 20px, rgba(74,222,128,.18) 1px, transparent 0),
        radial-gradient(circle 1px at 60px 60px, rgba(74,222,128,.10) 1px, transparent 0);
      background-size: 80px 80px;
      animation: rain-fall 28s linear infinite;
    }
    @keyframes rain-fall {
      0%   { transform: translateY(0); }
      100% { transform: translateY(120px); }
    }
    #bg-visita .bg-glow {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 1000px 500px at 85% 115%, rgba(74,222,128,.13) 0%, transparent 55%),
        radial-gradient(ellipse 500px 500px at -5% 0%,    rgba(231,197,29,.05) 0%, transparent 50%);
    }

    /* FESTIVIDAD — indigo + particles */
    #bg-festividad {
      background: linear-gradient(135deg, #08050f 0%, #160a28 45%, #1e0e38 75%, #0c0618 100%);
    }
    #bg-festividad .bg-stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle 1.5px at 10% 15%, rgba(231,197,29,.18) 0%, transparent 50%),
        radial-gradient(circle 1px  at 28% 72%, rgba(231,197,29,.10) 0%, transparent 50%),
        radial-gradient(circle 2px  at 48% 32%, rgba(231,197,29,.13) 0%, transparent 50%),
        radial-gradient(circle 1px  at 68% 78%, rgba(231,197,29,.10) 0%, transparent 50%),
        radial-gradient(circle 1.5px at 82% 22%,rgba(231,197,29,.16) 0%, transparent 50%),
        radial-gradient(circle 1px  at 94% 62%, rgba(231,197,29,.08) 0%, transparent 50%);
      animation: stars-pulse 8s ease-in-out infinite alternate;
    }
    @keyframes stars-pulse {
      0%   { opacity: .6; }
      100% { opacity: 1.0; }
    }
    #bg-festividad .bg-glow {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 82% 115%, rgba(120,60,200,.20) 0%, transparent 55%),
        radial-gradient(ellipse 600px 400px at 5% -5%,   rgba(231,197,29,.07) 0%, transparent 50%);
    }

    /* Floating particles — festividad */
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(231,197,29,.6);
      animation: float-up linear infinite;
      pointer-events: none;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: .5; }
      100% { transform: translateY(-340px) translateX(var(--dx,20px)); opacity: 0; }
    }

    /* ── GLASS ── */
    .glass {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      position: relative; overflow: hidden;
    }

    /* ── GLASS SHIMMER (C) — continuous light sweep on cards ── */
    .glass::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(105deg,
        transparent 0%,
        rgba(255,255,255,.04) 40%,
        rgba(255,255,255,.08) 50%,
        rgba(255,255,255,.04) 60%,
        transparent 100%);
      animation: glass-shimmer var(--shimmer-dur, 9s) ease-in-out infinite;
      animation-delay: var(--shimmer-delay, 0s);
      pointer-events: none;
    }
    @keyframes glass-shimmer {
      0%   { left: -100%; }
      40%  { left: 160%; }
      100% { left: 160%; }
    }

    /* ── HEADER ── */
    #header {
      position: absolute; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(10,12,10,.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 64px;
      z-index: 50;
    }
    #header-brand { display: flex; align-items: center; gap: 20px; }
    #header-brand img { height: 72px; width: auto; object-fit: contain; }
    #header-brand .divider { width: 2px; height: 52px; background: rgba(255,255,255,.15); }
    #header-brand span {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
    }
    #header-right { display: flex; align-items: center; gap: 32px; }
    #clock { text-align: right; }
    #clock-time {
      font-family: var(--font-display);
      font-size: 52px; font-weight: 800; line-height: 1; letter-spacing: 2px;
    }
    #clock-time .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
    #clock-date {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: #71de64; margin-top: 4px; text-align: right;
    }
    #weather { display: flex; align-items: center; gap: 12px; padding: 12px 24px; }
    #weather .wi { font-size: 40px; color: #ffe168; }
    #weather-temp { font-family: var(--font-display); font-size: 32px; font-weight: 800; line-height: 1; }
    #weather-desc { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(190,202,182,.7); margin-top: 3px; }

    /* ── MAIN ── */
    #main {
      position: absolute;
      top: var(--header-h); bottom: var(--footer-h);
      left: 0; right: 0;
      display: flex; gap: 32px;
      padding: 36px 64px;
    }

    /* LEFT */
    #left {
      flex: 1.5; display: flex; flex-direction: column;
      justify-content: center; padding-right: 32px;
    }

    #badge-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }

    #type-badge { display: flex; align-items: center; gap: 10px; padding: 7px 18px; border-radius: 4px; }
    #type-badge-bar { width: 5px; height: 34px; border-radius: 3px; flex-shrink: 0; }
    #type-badge-text {
      font-family: var(--font-display); font-size: 15px; font-weight: 800;
      letter-spacing: 3px; text-transform: uppercase;
    }
    #timing-badge {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 18px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.55);
    }
    #timing-badge.today {
      color: #ffe168; border-color: rgba(255,225,104,.6);
      background: rgba(255,225,104,.1);
      animation: pulse-badge 2.5s ease-in-out infinite;
    }
    @keyframes pulse-badge {
      0%,100% { box-shadow: 0 0 0 0 rgba(246,211,47,0); }
      50%      { box-shadow: 0 0 0 8px rgba(246,211,47,.1); }
    }

    /* TITLE — D: subtle breathing */
    #event-title {
      font-family: var(--font-display);
      font-size: 70px; font-weight: 900; line-height: 1.05;
      letter-spacing: -.5px; color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,.5);
      margin-bottom: 10px;
      transform-origin: left center;
    }
    #event-title.breathing {
      animation: breathe 6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1.000); }
      50%      { transform: scale(1.008); }
    }

    #event-parrafo {
      font-size: 21px; font-weight: 400; line-height: 1.55;
      color: rgba(226,226,226,.72); margin-bottom: 20px; max-width: 860px;
    }

    /* ── COUNTDOWN (A) ── */
    #countdown {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 22px; min-height: 52px;
    }
    #countdown-label {
      font-family: var(--font-display); font-size: 12px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(190,202,182,.5); white-space: nowrap;
    }
    #countdown-value {
      font-family: var(--font-display); font-size: 28px; font-weight: 800;
      letter-spacing: 1px;
    }
    #countdown-value .sep { color: rgba(255,255,255,.25); margin: 0 6px; }

    /* INFO GRID */
    #info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .info-card { display: flex; flex-direction: column; gap: 10px; padding: 18px 22px; }
    .info-card-header { display: flex; align-items: center; gap: 10px; }
    .info-card-header .mi { font-size: 24px; }
    .info-card-label {
      font-family: var(--font-display); font-size: 12px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: rgba(190,202,182,.6);
    }
    .info-card-value { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: #fff; }
    .info-card.full { grid-column: span 2; flex-direction: row; align-items: center; gap: 18px; }
    .info-card.full .info-card-header { flex-shrink: 0; }
    .info-card.full .card-divider { width: 1px; height: 38px; background: rgba(255,255,255,.12); flex-shrink: 0; }
    .info-card.full .info-card-value { font-size: 22px; }

    /* Stagger shimmer delays on cards */
    #card-fecha   { --shimmer-dur: 9s;  --shimmer-delay: 0s; }
    #card-hora    { --shimmer-dur: 9s;  --shimmer-delay: 2s; }
    #card-lugar   { --shimmer-dur: 11s; --shimmer-delay: 4s; }
    #card-dirigido{ --shimmer-dur: 11s; --shimmer-delay: 6s; }
    #mas-info     { --shimmer-dur: 10s; --shimmer-delay: 8s; }

    /* RIGHT */
    #right { flex: 1; display: flex; flex-direction: column; gap: 14px; }

    #image-panel {
      flex: 1; position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,.1);
    }
    /* image zoom-in on load */
    #event-img {
      /*CAMBIO DE AJUSTE DE LA IMAGEN A LA VENTANA*/
      /*width: 100%; height: 100%; object-fit: cover; display: none;*/
      width: 100%; height: 100%; object-fit: contain; display: none;
      animation: img-zoom 12s ease-in-out infinite alternate;
    }
    @keyframes img-zoom {
      0%   { transform: scale(1.00); }
      100% { transform: scale(1.06); }
    }
    #image-placeholder {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; opacity: .2;
    }
    #image-placeholder .mi { font-size: 72px; }
    #image-placeholder span {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
    }
    #image-panel::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(3,6,15,.65) 0%, transparent 40%);
      pointer-events: none;
    }
    #img-type-label {
      position: absolute; bottom: 22px; left: 22px; z-index: 2;
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.65);
    }
    .shimmer-line {
      width: 72px; height: 3px; border-radius: 2px; margin-bottom: 8px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.3), rgba(255,255,255,0));
      background-size: 200% 100%; animation: shimmer-line 3s infinite;
    }
    @keyframes shimmer-line { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    #mas-info { padding: 0; flex-shrink: 0; }
    #mas-info-inner {
      display: flex; flex-direction: row; align-items: center; gap: 18px;
      padding: 18px 22px;
    }
    #mas-info-inner .info-card-header { flex-shrink: 0; }
    #mas-info-inner .card-divider { width: 1px; height: 38px; background: rgba(255,255,255,.12); flex-shrink: 0; }
    #mas-info-value {
      font-family: var(--font-display); font-size: 22px; font-weight: 700;
      color: #fff; line-height: 1.3;
    }

    /* ── PROGRESS BAR ── */
    #progress-bar {
      position: absolute; bottom: var(--footer-h); left: 0;
      height: 3px; width: 0%;
      background: rgba(231,197,29,.75);
      z-index: 100; transition: width linear;
    }

    /* ── FOOTER TICKER ── */
    #footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      background: #001f3f;
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; overflow: hidden; z-index: 50;
    }
    #ticker-label-wrap {
      background: #e7c51d; height: 100%;
      display: flex; align-items: center;
      padding: 0 44px 0 56px; flex-shrink: 0;
      transform: skewX(-14deg); margin-left: -24px;
      box-shadow: 4px 0 20px rgba(0,0,0,.4); z-index: 2;
    }
    #ticker-label {
      font-family: var(--font-display); font-size: 19px; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase; color: #221b00;
      transform: skewX(14deg); white-space: nowrap;
    }
    #ticker-viewport { flex: 1; overflow: hidden; display: flex; align-items: center; padding-left: 40px; }
    #ticker-track { display: inline-flex; white-space: nowrap; align-items: center; }
    #ticker-track.running { animation: ticker linear infinite; }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .ticker-text {
      font-family: var(--font-display); font-size: 23px; font-weight: 700;
      color: #fff; white-space: nowrap; padding-right: 120px;
    }

    /* ── STATUS OVERLAY ── */
    #status {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,.82); z-index: 200; gap: 20px;
    }
    #status .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,.1); border-top-color: #e7c51d;
      border-radius: 50%; animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status .status-title {
      font-family: var(--font-display); font-size: 30px; font-weight: 700;
      letter-spacing: 3px; color: rgba(255,255,255,.7); text-align: center;
    }
    #status .status-sub { font-size: 15px; color: rgba(255,255,255,.35); text-align: center; max-width: 600px; }

    /* ── ENTRANCE ANIMATIONS ── */
    @keyframes fade-up {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .anim { animation: fade-up .65s cubic-bezier(.16,1,.3,1) forwards; opacity: 0; }
    .d1{animation-delay:.10s} .d2{animation-delay:.20s}
    .d3{animation-delay:.32s} .d4{animation-delay:.46s}
    .d5{animation-delay:.60s}
  </style>
</head>
<body>
<div id="scaler">

  <!-- BACKGROUNDS -->
  <div id="bg-jornada" class="bg-layer">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>
  <div id="bg-visita" class="bg-layer">
    <div class="bg-dots"></div>
    <div class="bg-glow"></div>
  </div>
  <div id="bg-festividad" class="bg-layer">
    <div class="bg-stars"></div>
    <div class="bg-glow"></div>
  </div>

  <!-- HEADER -->
  <header id="header">
    <div id="header-brand">
      <img src="logo.png" alt="EFA Campomar"
        onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block';" />
      <span id="logo-fallback" style="display:none;">EFA Campomar</span>
      <div class="divider"></div>
      <span>EFA Campomar</span>
    </div>
    <div id="header-right">
      <div id="clock">
        <div id="clock-time"><span id="ch">00</span><span class="blink">:</span><span id="cm">00</span></div>
        <div id="clock-date"></div>
      </div>
      <div id="weather" class="glass">
        <span id="wi" class="material-symbols-outlined wi">wb_sunny</span>
        <div>
          <div id="weather-temp">--°C</div>
          <div id="weather-desc">Cargando...</div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main">
    <div id="left">

      <div id="badge-row" class="anim">
        <div id="type-badge">
          <div id="type-badge-bar"></div>
          <span id="type-badge-text">—</span>
        </div>
        <div id="timing-badge">📌 Próximamente</div>
      </div>

      <h1 id="event-title">—</h1>
      <p  id="event-parrafo" class="anim d2"></p>

      <!-- COUNTDOWN -->
      <div id="countdown" class="anim d2">
        <span id="countdown-label">FALTAN</span>
        <span id="countdown-value">—</span>
      </div>

      <div id="info-grid" class="anim d3">
        <div id="card-fecha" class="info-card glass">
          <div class="info-card-header">
            <span class="material-symbols-outlined mi" id="icon-fecha">calendar_today</span>
            <span class="info-card-label">Fecha</span>
          </div>
          <div class="info-card-value" id="val-fecha">—</div>
        </div>
        <div id="card-hora" class="info-card glass">
          <div class="info-card-header">
            <span class="material-symbols-outlined mi" id="icon-hora">schedule</span>
            <span class="info-card-label">Horario</span>
          </div>
          <div class="info-card-value" id="val-hora">—</div>
        </div>
        <div id="card-lugar" class="info-card glass full">
          <div class="info-card-header">
            <span class="material-symbols-outlined mi" id="icon-lugar">location_on</span>
            <span class="info-card-label">Ubicación</span>
          </div>
          <div class="card-divider"></div>
          <div class="info-card-value" id="val-lugar">—</div>
        </div>
        <div id="card-dirigido" class="info-card glass full">
          <div class="info-card-header">
            <span class="material-symbols-outlined mi" id="icon-dirigido">group</span>
            <span class="info-card-label">Dirigido a</span>
          </div>
          <div class="card-divider"></div>
          <div class="info-card-value" id="val-dirigido">—</div>
        </div>
      </div>
    </div>

    <div id="right">
      <div id="image-panel" class="glass anim d2">
        <img id="event-img" alt="Imagen del evento" />
        <div id="image-placeholder">
          <span class="material-symbols-outlined mi">image</span>
          <span>Sin imagen</span>
        </div>
        <div id="img-type-label">
          <div class="shimmer-line"></div>
          <span id="img-type-text">EVENTO</span>
        </div>
      </div>
      <div id="mas-info" class="glass anim d4" style="display:none;">
        <div id="mas-info-inner">
          <div class="info-card-header">
            <span class="material-symbols-outlined mi" id="icon-masinfo">info</span>
            <span class="info-card-label">Más información</span>
          </div>
          <div class="card-divider"></div>
          <div id="mas-info-value">—</div>
        </div>
      </div>
    </div>
  </main>

  <div id="progress-bar"></div>

  <!-- FOOTER -->
  <footer id="footer">
    <div id="ticker-label-wrap"><span id="ticker-label">PRÓXIMOS EVENTOS</span></div>
    <div id="ticker-viewport">
      <div id="ticker-track">
        <span class="ticker-text" id="tick-a">—</span>
        <span class="ticker-text" id="tick-b">—</span>
      </div>
    </div>
  </footer>

  <!-- STATUS -->
  <div id="status">
    <div class="spinner"></div>
    <div class="status-title">Cargando actividades...</div>
  </div>

</div>

<script>
/* ══ SCALER ══ */
function applyScale() {
  const s = document.getElementById('scaler');
  const scale = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  s.style.transform = `scale(${scale})`;
  s.style.left = ((window.innerWidth  - 1920*scale)/2)+'px';
  s.style.top  = ((window.innerHeight - 1080*scale)/2)+'px';
}
applyScale();
window.addEventListener('resize', applyScale);

/* ══ TYPE CONFIG ══ */
const TYPES = {
  'Jornada':    { bar:'#4a9ede', bg:'rgba(74,158,222,.15)',  text:'#7ec8f7', bgId:'bg-jornada'    },
  'Visita':     { bar:'#4ade80', bg:'rgba(74,222,128,.15)',  text:'#7ee87a', bgId:'bg-visita'     },
  'Festividad': { bar:'#e7c51d', bg:'rgba(231,197,29,.15)',  text:'#ffe168', bgId:'bg-festividad' },
};
function getType(raw) {
  const s = (raw||'').trim();
  if (s.includes('Jornada')||s.toLowerCase().includes('charla')||s.toLowerCase().includes('conferencia')) return TYPES['Jornada'];
  if (s.includes('Visita') ||s.toLowerCase().includes('feria') ||s.toLowerCase().includes('empresa'))    return TYPES['Visita'];
  return TYPES['Festividad'];
}

/* ══ CLOCK ══ */
const DAYS    = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS  = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const MONTHS_S= ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

function updateClock() {
  const n = new Date();
  document.getElementById('ch').textContent = String(n.getHours()).padStart(2,'0');
  document.getElementById('cm').textContent = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock-date').textContent =
    `${DAYS[n.getDay()]}, ${n.getDate()} ${MONTHS_S[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ══ WEATHER ══ */
const WMO = {
  0:{i:'wb_sunny',d:'Despejado'},        1:{i:'wb_sunny',d:'Casi despejado'},
  2:{i:'partly_cloudy_day',d:'Parcialmente nublado'}, 3:{i:'cloud',d:'Nublado'},
  45:{i:'foggy',d:'Niebla'},             48:{i:'foggy',d:'Niebla helada'},
  51:{i:'grain',d:'Llovizna'},           61:{i:'rainy',d:'Lluvia leve'},
  63:{i:'rainy',d:'Lluvia moderada'},    65:{i:'rainy',d:'Lluvia intensa'},
  71:{i:'ac_unit',d:'Nieve'},            80:{i:'rainy',d:'Chubascos'},
  95:{i:'thunderstorm',d:'Tormenta'},
};
async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.7644&longitude=-2.6148&current=temperature_2m,weathercode&timezone=Europe%2FMadrid');
    const d = await r.json();
    const info = WMO[d.current.weathercode]||WMO[0];
    document.getElementById('weather-temp').textContent = `${Math.round(d.current.temperature_2m)}°C`;
    document.getElementById('weather-desc').textContent = info.d;
    document.getElementById('wi').textContent = info.i;
  } catch(e) { console.warn('Weather:', e); }
}
fetchWeather();
setInterval(fetchWeather, 10*60*1000);

/* ══ DATE HELPERS ══ */
function parseDate(s) {
  if (!s) return null;
  const p = s.includes('/') ? s.split('/') : s.split('-').reverse();
  if (p.length!==3) return null;
  const [d,m,y] = p.map(Number);
  return new Date(y, m-1, d);
}
function midnight(d) { const x=new Date(d); x.setHours(0,0,0,0); return x; }
function isToday(s) {
  const d=parseDate(s); if(!d) return false;
  return midnight(d).getTime()===midnight(new Date()).getTime();
}
function fmtDate(s) {
  const d=parseDate(s); if(!d) return s;
  return `${DAYS[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]} de ${d.getFullYear()}`;
}

/* ══ COUNTDOWN (A) ══ */
let countdownEvent = null;
let countdownTimer = null;

function updateCountdown() {
  const el = document.getElementById('countdown-value');
  const lb = document.getElementById('countdown-label');
  if (!countdownEvent) { el.textContent='—'; return; }

  const eventDate = parseDate(countdownEvent.fecha);
  if (!eventDate) { document.getElementById('countdown').style.display='none'; return; }

  const now  = new Date();
  const diff = midnight(eventDate).getTime() - midnight(now).getTime();
  const days = Math.round(diff / (1000*60*60*24));

  if (days < 0) {
    document.getElementById('countdown').style.display='none';
  } else if (days === 0) {
    lb.textContent = '';
    el.innerHTML = `<span style="color:#7ee87a">🟢 HOY</span>`;
    document.getElementById('countdown').style.display='flex';
  } else if (days === 1) {
    lb.textContent = 'FALTA';
    el.innerHTML = `<span style="color:var(--accent-color,#ffe168)">1 día</span>`;
    document.getElementById('countdown').style.display='flex';
  } else {
    lb.textContent = 'FALTAN';
    el.innerHTML = `<span style="color:var(--accent-color,#ffe168)">${days} días</span>`;
    document.getElementById('countdown').style.display='flex';
  }
}

/* ══ IMAGE ══ */
function resolveImg(url) {
  if (!url) return '';
  url = url.trim();
  if (!url.startsWith('http') && !url.startsWith('//'))
    return window.location.href.replace(/\/[^\/]*$/,'/') + url;
  return url;
}

/* ══ BACKGROUND ══ */
function setBg(tc) {
  document.querySelectorAll('.bg-layer').forEach(l => l.classList.remove('active'));
  document.getElementById(tc.bgId).classList.add('active');
  document.querySelectorAll('.particle').forEach(p => p.remove());
  if (tc.bgId==='bg-festividad') {
    const bg = document.getElementById('bg-festividad');
    for (let i=0;i<24;i++) {
      const p = document.createElement('div');
      p.className='particle';
      p.style.cssText=`left:${Math.random()*100}%;bottom:${3+Math.random()*28}%;width:${1+Math.random()*3.5}px;height:${1+Math.random()*3.5}px;animation-duration:${4+Math.random()*10}s;animation-delay:${-Math.random()*10}s;--dx:${(Math.random()-.5)*100}px;opacity:${.25+Math.random()*.6}`;
      bg.appendChild(p);
    }
  }
}

/* ══ RENDER ══ */
function render(ev) {
  const tc = getType(ev.tipo);

  // accent color CSS var for countdown
  document.documentElement.style.setProperty('--accent-color', tc.text);

  // badge
  document.getElementById('type-badge-bar').style.background = tc.bar;
  document.getElementById('type-badge').style.background      = tc.bg;
  document.getElementById('type-badge-text').style.color      = tc.text;
  document.getElementById('type-badge-text').textContent      = ev.tipo||'—';

  // timing
  const tb = document.getElementById('timing-badge');
  if (isToday(ev.fecha)) {
    tb.textContent = '📅 HOY'; tb.className = 'today';
  } else {
    tb.textContent = '📌 Próximamente'; tb.className = '';
  }

  // title + parrafo — tamaño dinámico según longitud
  const titleEl = document.getElementById('event-title');
  titleEl.classList.remove('breathing');
  titleEl.style.opacity = '0';
  titleEl.style.transform = 'translateY(22px)';
  titleEl.textContent = ev.titulo||'—';
  const tlen = (ev.titulo||'').length;
  titleEl.style.fontSize = tlen > 40 ? '48px' : tlen > 25 ? '58px' : '70px';
  setTimeout(() => {
    titleEl.style.transition = 'opacity .65s cubic-bezier(.16,1,.3,1), transform .65s cubic-bezier(.16,1,.3,1)';
    titleEl.style.transitionDelay = '.10s';
    titleEl.style.opacity = '1';
    titleEl.style.transform = 'translateY(0)';
  }, 20);
  const pEl = document.getElementById('event-parrafo');
  pEl.textContent = ev.parrafo||'';
  pEl.style.display = ev.parrafo ? 'block' : 'none';

  // countdown
  countdownEvent = ev;
  updateCountdown();
  clearInterval(countdownTimer);
  countdownTimer = setInterval(updateCountdown, 60000);

  // info cards accent colour — all icons unified
  ['icon-fecha','icon-hora','icon-lugar','icon-dirigido','icon-masinfo'].forEach(id => {
    const el = document.getElementById(id); if(el) el.style.color = tc.text;
  });
  ['val-fecha','val-hora'].forEach(id => { document.getElementById(id).style.color = tc.text; });

  document.getElementById('val-fecha').textContent    = fmtDate(ev.fecha);
  document.getElementById('val-hora').textContent     = ev.hora    ||'—';
  document.getElementById('val-lugar').textContent    = ev.lugar   ||'—';
  document.getElementById('val-dirigido').textContent = ev.dirigido||'—';

  // image
  const img = document.getElementById('event-img');
  const ph  = document.getElementById('image-placeholder');
  const src = resolveImg(ev.imagen);
  if (src) {
    img.src=src; img.style.display='block'; ph.style.display='none';
    img.onerror = () => { img.style.display='none'; ph.style.display='flex'; };
  } else {
    img.style.display='none'; ph.style.display='flex';
  }
  document.getElementById('img-type-text').textContent = (ev.tipo||'Evento').toUpperCase();

  // mas info
  const mi = document.getElementById('mas-info');
  if (ev.masInfo) {
    document.getElementById('mas-info-value').textContent = ev.masInfo;
    mi.style.display = 'block';
  } else {
    mi.style.display = 'none';
  }

  setBg(tc);

  // re-trigger entrance animations, then activate breathing on title
  const title = document.getElementById('event-title');
  title.classList.remove('breathing');
  document.querySelectorAll('.anim').forEach(el => {
    el.style.animation='none'; void el.offsetWidth; el.style.animation='';
  });
  // start breathing after entrance animation finishes (~800ms)
  setTimeout(() => title.classList.add('breathing'), 900);
}

/* ══ TICKER ══ */
let tickerMode='proximos', tickerTimer=null;

function selectActive(events) {
  const now=new Date();
  const up=events.filter(e=>{
    const d=parseDate(e.fecha); if(!d) return false;
    return now < new Date(midnight(d).getTime()+24*60*60*1000);
  }).sort((a,b)=>parseDate(a.fecha)-parseDate(b.fecha));
  if (!up.length) return [];
  const t=midnight(parseDate(up[0].fecha)).getTime();
  return up.filter(e=>midnight(parseDate(e.fecha)).getTime()===t);
}
function selectNext(events, activeMid) {
  return events.filter(e=>{const d=parseDate(e.fecha);return d&&midnight(d).getTime()>activeMid;})
    .sort((a,b)=>parseDate(a.fecha)-parseDate(b.fecha))[0]||null;
}

function setTicker(mode, events) {
  const label=document.getElementById('ticker-label');
  const ta=document.getElementById('tick-a'), tb=document.getElementById('tick-b');
  const track=document.getElementById('ticker-track');
  let text='';
  if (mode==='proximos') {
    label.textContent='PRÓXIMOS EVENTOS';
    const active=selectActive(events);
    const aMid=active.length?midnight(parseDate(active[0].fecha)).getTime():0;
    const next=selectNext(events,aMid);
    text=next?`${next.titulo}  ·  ${fmtDate(next.fecha)}`:'No hay más eventos programados próximamente';
  } else {
    label.textContent='ÚLTIMA HORA';
    const msgs=events.filter(e=>e.ultimaHora).map(e=>e.ultimaHora);
    text=msgs.length?msgs.join('  ·  '):'Sin novedades';
  }
  ta.textContent=text; tb.textContent=text;
  track.classList.remove('running'); void track.offsetWidth;
  track.style.animationDuration=Math.max(16,text.length*.5)+'s';
  track.classList.add('running');
}

function startTicker(events) {
  clearInterval(tickerTimer);
  tickerMode='proximos'; setTicker('proximos',events);
  tickerTimer=setInterval(()=>{ tickerMode=tickerMode==='proximos'?'ultimahora':'proximos'; setTicker(tickerMode,events); },15000);
}

/* ══ PROGRESS BAR ══ */
function startProgress(ms) {
  const bar=document.getElementById('progress-bar');
  bar.style.transition='none'; bar.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ bar.style.transition=`width ${ms}ms linear`; bar.style.width='100%'; }));
}

/* ══ CAROUSEL ══ */
let car={events:[],current:0,timer:null};
const SLIDE_MS=10000;
function showSlide(idx) {
  car.current=idx%car.events.length;
  render(car.events[car.current]);
  if(car.events.length>1) startProgress(SLIDE_MS);
  else document.getElementById('progress-bar').style.width='0%';
}
function startCarousel(events) {
  car.events=events; car.current=0; clearInterval(car.timer);
  showSlide(0);
  if(events.length>1) car.timer=setInterval(()=>showSlide(car.current+1),SLIDE_MS);
}

/* ══ STATUS ══ */
function showStatus(icon,title,sub) {
  const s=document.getElementById('status');
  s.innerHTML=`<div style="font-size:60px">${icon}</div><div class="status-title">${title}</div>${sub?`<div class="status-sub">${sub}</div>`:''}`;
  s.style.display='flex';
}

/* ══ LOAD ══ */
async function load() {
  try {
    const r=await fetch('eventos.json?t='+Date.now());
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const events=await r.json();
    const active=selectActive(events);
    document.getElementById('status').style.display='none';
    if(!active.length) {
      showStatus('📋','Sin actividades próximas','Cuando se programen nuevas actividades aparecerán aquí.');
      document.getElementById('bg-jornada').classList.add('active'); return;
    }
    startCarousel(active);
    startTicker(events);
  } catch(e) {
    console.error(e);
    showStatus('⚠️','Error al cargar los datos',e.message);
  }
}
load();
setInterval(load, 5*60*1000);
let lastDay=new Date().getDate();
setInterval(()=>{ const d=new Date().getDate(); if(d!==lastDay){lastDay=d;load();} },60000);
</script>
